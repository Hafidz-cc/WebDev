<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HiveMinds</title>
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/auth.css">
    <style>
        @keyframes bgCycle {
            0%,  30% { background-image: url('images/backgroundimg1.png'); }
            33%, 63% { background-image: url('images/backgroundimg2.png'); }
            66%, 96% { background-image: url('images/backgroundimg3.jpg'); }
            100%      { background-image: url('images/backgroundimg1.png'); }
        }

        body.auth-page {
            animation: bgCycle 15s infinite;
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="auth-page">

<div class="login-container">
    <div class="login-card">
        <a href="landing-page.html" class="close-page">×</a>
        <h1>Login</h1>

        <form action="home_home-feed.html" method="get">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="divider"><span>or</span></div>

        <button class="google-btn">
            <span class="google-icon">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google">
            </span>
            Log in with Google
        </button>

        <p class="signup-link">
            Don't have an account? <a href="signup.html">Sign up</a>
        </p>
    </div>
</div>

</body>
</html>
