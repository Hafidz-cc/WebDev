<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="CSS/base.css">
        <link rel="stylesheet" href="CSS/navbar.css">
        <link rel="stylesheet" href="CSS/hives.css">

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Belanosima&family=Bricolage+Grotesque:opsz,wght@12..96,420&family=Coiny&family=McLaren&family=Pacifico&family=Pangolin&display=swap" rel="stylesheet">
    </head>

    <body>
        <nav>
            <div id="nav-container">
                <a href="landing-page.html">
                    <div class="logo">
                        <span class="black">Hive</span><span class="orange">Minds</span>
                    </div>
                </a>
                <div id="nav-links">
                    <a class="hover" href="home_home-feed.html">Home</a>
                    <a class="hover active-nav" href="hives.html">Hives</a>
                    <a class="hover" href="profile.html">Profile</a>
                </div>
                <div id="auth-links">
                    <a class="hover" href="profile.html">Rick Buzztley</a>
                </div>
            </div>
        </nav>

        <main>
            <div id="container">
                <div id="content" style="width: 100%;">
                    <div id="hives-body">

                        <div class="hives-topbar">
                            <p class="content-title">Create a Hive</p>
                            <a href="hives.html" class="btn-cancel">← Back to Browse</a>
                        </div>

                        <div id="create-hive-panel">
                            <div class="panel-title">Hive Details</div>

                            <form action="hives.html" method="get">
                                <div class="form-grid">

                                    <div class="form-field full">
                                        <label for="hive-name">Hive Name</label>
                                        <input type="text" id="hive-name" name="hive-name" placeholder="e.g. Calculus Study Group" required>
                                    </div>

                                    <div class="form-field full">
                                        <label for="hive-desc">Description</label>
                                        <textarea id="hive-desc" name="hive-desc" placeholder="What is this hive about? What will members do?" required></textarea>
                                    </div>

                                    <div class="form-field">
                                        <label for="hive-subject">Subject</label>
                                        <select id="hive-subject" name="hive-subject">
                                            <option value="">Select a subject</option>
                                            <option value="mathematics">Mathematics</option>
                                            <option value="biology">Biology</option>
                                            <option value="chemistry">Chemistry</option>
                                            <option value="physics">Physics</option>
                                            <option value="history">History</option>
                                            <option value="english">English</option>
                                            <option value="technology">Technology</option>
                                            <option value="other">Other</option>
                                        </select>
                                    </div>

                                    <div class="form-field">
                                        <label for="hive-frequency">Frequency</label>
                                        <select id="hive-frequency" name="hive-frequency">
                                            <option value="recurring">Recurring</option>
                                            <option value="one-time">One-time</option>
                                        </select>
                                    </div>

                                    <div class="form-field">
                                        <label for="hive-mode">Mode</label>
                                        <select id="hive-mode" name="hive-mode">
                                            <option value="online">Online</option>
                                            <option value="in-person">In-person</option>
                                        </select>
                                    </div>

                                    <div class="form-field">
                                        <label for="hive-limit">Member Limit</label>
                                        <input type="number" id="hive-limit" name="hive-limit" placeholder="e.g. 30" min="2" max="200">
                                    </div>

                                    <div class="form-field">
                                        <label for="hive-date">Session Date</label>
                                        <input type="date" id="hive-date" name="hive-date">
                                    </div>

                                    <div class="form-field">
                                        <label for="hive-time-start">Start Time</label>
                                        <input type="time" id="hive-time-start" name="hive-time-start">
                                    </div>

                                    <div class="form-field">
                                        <label for="hive-time-end">End Time</label>
                                        <input type="time" id="hive-time-end" name="hive-time-end">
                                    </div>

                                    <div class="form-field">
                                        <label for="hive-location">Location / Platform</label>
                                        <input type="text" id="hive-location" name="hive-location" placeholder="e.g. Discord, Room 204">
                                    </div>

                                    <div class="form-field full">
                                        <label for="hive-topic">Session Topic</label>
                                        <input type="text" id="hive-topic" name="hive-topic" placeholder="e.g. Linear algebra basics review">
                                    </div>

                                    <div class="form-field full">
                                        <label for="hive-rules">Group Rules</label>
                                        <textarea id="hive-rules" name="hive-rules" placeholder="List your group rules here, one per line."></textarea>
                                    </div>

                                </div>

                                <div class="form-actions">
                                    <a href="hives.html" class="btn-cancel">Cancel</a>
                                    <button type="button" class="btn-submit" onclick="document.getElementById('verif-modal').style.display='flex'">Create Hive</button>
                                </div>
                            </form>

                        </div>

                    </div>
                </div>
            </div>
        </main>
        <div id="verif-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); align-items:center; justify-content:center; z-index:1000;">
  <div style="background:var(--color-bg, #fff); border-radius:12px; padding:2rem; max-width:380px; width:90%; text-align:center; box-shadow: 0 8px 32px rgba(0,0,0,0.15);">
    <div style="width:52px;height:52px;border-radius:50%;background:#fff5e6;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
      <!-- shield/check icon -->
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" fill="#f0860a" opacity="0.15"/>
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" stroke="#f0860a" stroke-width="1.5"/>
        <path d="M12 8v4m0 3h.01" stroke="#f0860a" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h2 style="font-size:1.1rem;font-weight:600;margin-bottom:0.5rem;">Your hive is under review</h2>
    <p style="font-size:0.9rem;color:#666;line-height:1.6;margin-bottom:1.5rem;">Your hive has been submitted and will go through a quick verification process before it becomes visible to other members. We'll notify you once it's approved.</p>
    <button onclick="document.getElementById('verif-modal').style.display='none'" style="background:#f0860a;color:#fff;border:none;border-radius:8px;padding:10px 28px;font-size:0.9rem;font-weight:600;cursor:pointer;width:100%;">Got it</button>
  </div>
</div>
    </body>
</html>
