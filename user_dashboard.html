<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Buddy — My Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <!--font family-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <!--Icons used-->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" />
  <link rel = "stylesheet" href = "CSS/user_dashboard_style.css">
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <a href="index.html" class="sb-brand">
    <div class="sb-logo">
        <span class="material-symbols-rounded" style ="color:#6D00CC;">auto_stories</span>
    </div>
    <span class="sb-name" style ="font-family:Instrument Serif;font-size:20px;font-weight:lighter;">Study Buddy</span>
  </a>
  <nav>
    <button class="nav-btn active" onclick="navigate('dashboard', this)">
        <span class="icon">
            <span class="material-symbols-rounded">home</span>
        </span> 
        <span> </span>
        Dashboard
    </button>

    <button class="nav-btn" onclick="navigate('explore', this)">
        <span class="icon">
            <span class="material-symbols-rounded">search</span>
        </span> 
        <span> </span>
        Explore Groups
    </button>

    <button class="nav-btn" onclick="navigate('mygroups', this)">
        <span class="icon">
            <span class="material-symbols-rounded">diversity_3</span>
        </span>
        <span> </span>
        My Groups
    </button>

    <button class="nav-btn" onclick="navigate('messages', this)">
        <span class="icon">
            <span class="material-symbols-rounded">chat_bubble</span>
        </span>
        <span> </span>
        Messages 
        <span class="nav-badge">3</span>
    </button>

    <button class="nav-btn" onclick="navigate('notifications', this)">
        <span class="icon">
            <span class="material-symbols-rounded">notifications</span>
        </span>
        <span> </span>
        Notifications 
        <span class="nav-badge">5</span>
    </button>

    <button class="nav-btn" onclick="navigate('profile', this)">
        <span class="icon">
            <span class="material-symbols-rounded">account_circle</span>
        </span>
        <span> </span>
        Profile
    </button>

    <button class="nav-btn" onclick="window.location.href='index.html'" style="margin-top:auto;">
        <span class="icon">
            <span class="material-symbols-rounded">logout</span>
        </span>
        <span> </span>
        Sign Out
    </button>
  </nav>

  <div class="sb-footer">
    <div class="sb-av">JD</div>
    <div class="sb-user">
      <div class="sb-uname">Juan Dela Cruz</div>
      <div class="sb-urole">Computer Science</div>
    </div>
  </div>
</aside>
