<!DOCTYPE html>
<html lang="en">
<head>

        </div>
        <span class="admin-pill">ADMIN</span>

    <nav>
        <button class="nav-btn active" onclick="navigate('overview', this)">
            <span class="icon">
                <span class="material-symbols-rounded">analytics</span>

        <button class="nav-btn" onclick="navigate('users', this)">
            <span class="icon">
                <span class="material-symbols-rounded">group</span>

            <span class="icon">
