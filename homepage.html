<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/home.css">
    <link rel="stylesheet" href="CSS/navbar.css">
    <link rel="stylesheet" href="CSS/footer.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBuddy</title>
   
</head>
<body>
    <nav class="navbar">  
        <div class="logo">StudyBuddy</div>
            <ul class="nav-links">
                <li><a href="homepage.html" class="nav-item">Home</a></li>
                <li><a href="MyGroups.html" class="nav-item">My Groups</a></li>
                <li><a href="groups.html" class="nav-item">Groups</a></li>
            </ul>

        <div id="authentification">
            <a href="login.html" class="nav-links nav-item">Login</a>
            <a href="signup.html" class="nav-links nav-item">Sign Up</a>
        </div>
    </nav>
    
    <div id="text">
        <span class="front">Learn better,</span>
     
        <span class="front one"> together.</span>
    </div>

    <div id="description">
        <p> Connect with peers, share knowledge, and ace your classes.<br> Find the perfect study squad for any subject, anytime, anywhere.</p>
    </div>

  
        <div id="inputs">
            <form action="/search" method="get">
                 <input type="search" class="search-bar" aria-label="Search for a study topic" placeholder="What do you want to study?">
                 <input type="submit" value="Search" class="search-button">
                 
             </form>
             

            <button id = "open">Create Group</button>

                <div class = "modal-container" id = "modal_container">
                    <div class = "modal">
                        
                        <div class = "container">
                            <div class = "title">Start a New Study Group</div>
                            <p>Set up the details so the right people can find and join you.</p>
                        </div>
                        <button id = "close">Close</button>
                </div>
        </div>
        <script>
            const open = document.getElementById('open');
            const modal_container = document.getElementById('modal_container');
            const close = document.getElementById('close');

            open.addEventListener('click' , () => {
                modal_container.classList.add('show');
            });

            close.addEventListener('click' , () => {
                modal_container.classList.remove('show');
            });
        </script>

                        
    </div>

           
                
           
        </div>
    

         
    
</body>

   
</html>
