<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - HiveMinds</title>
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/auth.css">
    <style>
        @keyframes bgCycle {
            0%,  30% { background-image: url('images/backgroundimg1.png'); }
            33%, 63% { background-image: url('images/backgroundimg2.png'); }
            66%, 96% { background-image: url('images/backgroundimg3.jpg'); }
            100%      { background-image: url('images/backgroundimg1.png'); }
        }

        body.auth-page {
            animation: bgCycle 15s infinite;
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="auth-page">

<div class="login-container">
    <div class="login-card">
        <a href="login.html" class="close-page">×</a>
        <h1>Sign Up</h1>

        <form action="verify-enrollment.html" method="get">
            <input type="text" name="lastName" placeholder="Last Name" required>
            <input type="text" name="firstName" placeholder="First Name" required>
            <input type="text" name="middleInitial" placeholder="Middle Initial (optional)" maxlength="1">
            <label for="birthdate" id="bdate">Birthdate</label>
            <input type="date" name="birthdate" placeholder="birthdate" required>
            <input type="email" name="email" title="Please use your @wmsu.edu.ph email address" pattern=[a-zA-Z0-9._%+\-]+@wmsu\.edu\.ph placeholder="e.g.,ty0000000000@wmsu.edu.ph" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="text" name="Year" placeholder="Year Level" required>
            <input type="text" name="section" placeholder="Section" required>
            <input type="text" name="course" placeholder="Course (e.g., BS Computer Science)" required>
             <input type="password" name="confirmPassword" placeholder="Confirm Password" required>
   
           
           
            <button type="submit">Create Account</button>
        </form>

        

        <p class="signup-link">
            Already have an account? <a href="login.html">Login</a>
        </p>
    </div>
</div>

</body>
</html>
